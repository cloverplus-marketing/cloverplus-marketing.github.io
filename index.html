<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clover Plus Seminar System</title>
<style>
:root{--green:#196B24;--green2:#22922f;--bg:#f0f7f2;--text:#1a3320;--orange:#E97132;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Yu Gothic','Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:48px 40px;width:100%;max-width:440px;text-align:center;}
.logo{color:var(--green);font-size:26px;font-weight:bold;margin-bottom:6px;}
.sub{color:#666;font-size:13px;margin-bottom:36px;}
label{display:block;text-align:left;font-size:13px;font-weight:bold;margin-bottom:6px;}
input{width:100%;padding:12px 16px;border:2px solid #ddd;border-radius:8px;font-size:16px;font-family:inherit;letter-spacing:.1em;transition:border-color .2s;}
input:focus{outline:none;border-color:var(--green);}
.btn{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:16px;font-family:inherit;font-weight:bold;cursor:pointer;margin-top:20px;transition:background .2s;}
.btn:hover{background:var(--green2);}
.err{color:#c00;font-size:13px;margin-top:10px;display:none;}
.links{margin-top:24px;font-size:13px;}
.links a{color:var(--green);text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Clover Plus Seminar System</div>
  <div class="sub">セミナーコードを入力してください</div>
  <label for="code">セミナーコード</label>
  <input type="text" id="code" placeholder="CP-XXXXXX" maxlength="9" autocomplete="off">
  <div class="err" id="err"></div>
  <button class="btn" onclick="enter()">入室する</button>
  <div class="links">
    <a href="register.html">パートナー登録</a>
    &nbsp;|&nbsp;
    <a href="partner.html">パートナーログイン</a>
    &nbsp;|&nbsp;
    <a href="admin.html">管理者</a>
  </div>
</div>
<script>
function enter(){
  const code = document.getElementById('code').value.trim().toUpperCase();
  const err = document.getElementById('err');
  if(!code){err.textContent='セミナーコードを入力してください';err.style.display='block';return;}
  if(!/^CP-[A-Z0-9]{6}$/.test(code)){err.textContent='正しいセミナーコードを入力してください（例: CP-A3F7K2）';err.style.display='block';return;}
  err.style.display='none';
  sessionStorage.setItem('session_code',code);
  location.href='dashboard.html';
}
document.getElementById('code').addEventListener('keydown',e=>{if(e.key==='Enter')enter();});
</script>
</body>
</html>
